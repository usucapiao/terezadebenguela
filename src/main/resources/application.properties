spring.application.name=teresa

# Upload de imagens
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Importa variáveis do arquivo .env na raiz do projeto (ignorado pelo git)
# Em produção, defina as variáveis diretamente no ambiente do servidor
spring.config.import=optional:file:.env[.properties]

# JWT — em produção, JWT_SECRET DEVE ser definido como variável de ambiente
# O fallback abaixo existe apenas para evitar falha de startup em dev sem .env
api.security.token.secret=${JWT_SECRET:insecure-local-dev-only}

# Rate limiting no login — sobrescrito por LOGIN_RATELIMIT_MAX_ATTEMPTS / LOGIN_RATELIMIT_WINDOW_MINUTES
login.ratelimit.max-attempts=${LOGIN_RATELIMIT_MAX_ATTEMPTS:5}
login.ratelimit.window-minutes=${LOGIN_RATELIMIT_WINDOW_MINUTES:15}

# Admin inicial — sobrescrito pelas variáveis ADMIN_USERNAME / ADMIN_PASSWORD
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# ----------------------------------------------------------------
# H2 Database (desenvolvimento local)
# Descomente este bloco e comente o bloco PostgreSQL abaixo
# ----------------------------------------------------------------
# spring.datasource.url=${DB_H2_URL}
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=${DB_H2_USERNAME}
# spring.datasource.password=${DB_H2_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# ----------------------------------------------------------------
# PostgreSQL (produção / staging)
# Aceita DB_PG_* (nomes customizados) ou SPRING_DATASOURCE_* (padrão Spring Boot).
# No Render, cadastre SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME e
# SPRING_DATASOURCE_PASSWORD — Spring Boot os aplica diretamente sem depender
# desta resolução de placeholder.
# ----------------------------------------------------------------
spring.datasource.url=${DB_PG_URL:not-configured}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_PG_USERNAME:}
spring.datasource.password=${DB_PG_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator — apenas /actuator/health é exposto publicamente
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# SMTP — notificações de candidatura de voluntário
# Deixe MAIL_HOST em branco para desabilitar o envio (modo silencioso)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# E-mail que recebe as notificações de nova candidatura
mail.notification.recipient=${MAIL_NOTIFICATION_RECIPIENT:}
