spring.application.name=teresa

# Upload de imagens
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Importa variáveis do arquivo .env na raiz do projeto (ignorado pelo git)
# Em produção, defina as variáveis diretamente no ambiente do servidor
spring.config.import=optional:file:.env[.properties]

# JWT
api.security.token.secret=${JWT_SECRET}

# ----------------------------------------------------------------
# H2 Database (desenvolvimento local)
# Descomente este bloco e comente o bloco PostgreSQL abaixo
# ----------------------------------------------------------------
# spring.datasource.url=${DB_H2_URL}
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=${DB_H2_USERNAME}
# spring.datasource.password=${DB_H2_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# ----------------------------------------------------------------
# PostgreSQL (produção / staging)
# A base teresadb deve existir previamente no banco (vazia é suficiente)
# ----------------------------------------------------------------
spring.datasource.url=${DB_PG_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_PG_USERNAME}
spring.datasource.password=${DB_PG_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
