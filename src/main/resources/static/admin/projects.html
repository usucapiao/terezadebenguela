<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciar Projetos - Admin Instituto Teresa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/admin.css">
    <script src="./js/common.js" defer></script>
    <script src="./js/icon-picker.js" defer></script>
    <script src="./js/image-picker.js" defer></script>
    <script src="./js/video-picker.js" defer></script>
    <script src="./js/projects.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow admin-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <img class="h-8 w-auto" src="../assets/logo.svg" alt="Teresa" onerror="this.style.display='none'">
                        <span class="ml-2 font-bold text-xl admin-logo-text">Admin</span>
                    </div>
                    <div class="hidden sm:-my-px sm:ml-6 sm:flex sm:space-x-8">
                        <a href="index.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Dashboard</a>
                        <a href="board.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Diretoria</a>
                        <a href="projects.html" class="nav-brand-active inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Projetos</a>
                        <a href="volunteers.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Voluntários</a>
                        <a href="news.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Notícias</a>
                        <a href="discography.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Discografia</a>
                        <a href="settings.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Configurações</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button id="logout-btn" class="ml-3 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700">Sair <i class="fas fa-sign-out-alt ml-2"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-8">
            <div id="alert-message" class="hidden rounded-md p-4"></div>

            <!-- Grid de projetos -->
            <div class="bg-white shadow sm:rounded-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-lg font-medium text-gray-900">Projetos cadastrados</h2>
                        <p class="text-sm text-gray-500">Clique em um projeto para editar.</p>
                    </div>
                    <button id="btn-new-project" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700">
                        <i class="fas fa-plus mr-2"></i> Novo Projeto
                    </button>
                </div>
                <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <p class="col-span-full text-gray-500">Carregando...</p>
                </div>
            </div>

            <!-- Formulário de edição/criação -->
            <div id="edit-form-card" class="bg-white shadow sm:rounded-lg p-6 hidden">
                <h2 class="text-lg font-medium text-gray-900 mb-4">
                    Editando: <span id="current-editing-title" class="link-brand"></span>
                </h2>

                <form id="project-form" class="space-y-6">
                    <input type="hidden" id="project-id">

                    <div class="grid grid-cols-1 gap-y-4 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Code (ID HTML)</label>
                            <input type="text" name="code" id="project-code" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Título Público</label>
                            <input type="text" name="title" id="project-title" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Subtítulo</label>
                            <input type="text" name="subtitle" id="project-subtitle" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Descrição</label>
                            <textarea id="project-description" name="description" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Impacto Cultural</label>
                            <textarea id="project-impact" name="impact" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Imagem do Projeto</label>
                            <input type="text" name="image" id="project-image" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm">
                        </div>
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Vídeo do YouTube <span class="text-gray-400 font-normal">(opcional)</span></label>
                            <input type="text" id="project-video" class="mt-1 block w-full border border-gray-300 rounded-md p-2 sm:text-sm">
                        </div>

                        <!-- Features -->
                        <div class="sm:col-span-6">
                            <div class="flex items-center justify-between mb-2">
                                <label class="block text-sm font-medium text-gray-700">Características do Projeto</label>
                                <button type="button" onclick="addFeatureRow()" class="text-sm link-brand font-medium">
                                    <i class="fas fa-plus mr-1"></i> Adicionar item
                                </button>
                            </div>
                            <div id="features-container" class="space-y-2"></div>
                            <p class="mt-1 text-xs text-gray-400">Clique no botão de ícone para escolher graficamente. Deixe sem ícone para ignorar.</p>
                        </div>
                    </div>

                    <div class="pt-5 border-t border-gray-200 flex justify-end gap-3">
                        <button type="button" onclick="hideEditForm()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">
                            Cancelar
                        </button>
                        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white btn-brand">
                            Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
